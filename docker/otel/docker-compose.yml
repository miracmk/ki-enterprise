services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ki-enterprise-otel
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../../infrastructure/otel/config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - ki-enterprise
networks:
  ki-enterprise:
    external: true
