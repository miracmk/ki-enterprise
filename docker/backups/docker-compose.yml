services:
  pg-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: ki-enterprise-pg-backup
    environment:
      - POSTGRES_HOST=ki-enterprise-postgres
      - POSTGRES_DB=ki_enterprise,litellm,temporal,temporal_visibility,ki_ai,ki_keycloak,ki_logs,ki_observability
      - POSTGRES_USER=ki
      - POSTGRES_PASSWORD=StrongPassword123!
      - SCHEDULE=@every 6h
      - BACKUP_KEEP_DAYS=7
    volumes:
      - ../../storage/backups/postgres:/backups
    networks:
      - ki-enterprise
  s3-backup:
    image: minio/mc
    container_name: ki-enterprise-s3-backup
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://ki-enterprise-minio:9000 admin ki_minio_pass 2>/dev/null || true;
      echo 'MinIO Client (mc) yedekleme icin hazir.';
      tail -f /dev/null
      "
    networks:
      - ki-enterprise
networks:
  ki-enterprise:
    external: true
