litellm_settings:
  drop_params: true
  set_verbose: false
  turn_off_message_logging: false
  disable_end_user_cost_tracking: true
  disable_adding_anthropic_headers: true
  use_azure: false
  use_vertex_ai: false
  use_aws: false
  # num_retries dusuk tutulur (fallback zinciri asil guvenceyi sagliyor - her
  # model icin 3x retry + 4 modelli zincir = asiri uzun bekleme riski olurdu).
  # request_timeout, cagiran servislerin kendi httpx timeout'larina (90s) yakin
  # tutulur ki bir modelin takilmasi butun zinciri gereksiz yere uzatmasin.
  num_retries: 1
  request_timeout: 90
  # Guclu -> zayif, ucretsiz-once sirali fallback zinciri (bkz. Miraç talimati
  # 2026-07-13). SADECE gercek curl testiyle CALISTIGI doğrulanmis modeller
  # zincirde tutuluyor (2026-07-13 test): Gemini key'i quota=0 (kullanilamaz),
  # openrouter-qwen-qwen3-next-80b-a3b-instruct ve
  # openrouter-meta-llama-llama-3-3-70b-instruct upstream'de rate-limitli
  # cikti (429) - bir fallback zincirindeki HERHANGI bir modelin hata turu
  # "retry edilemez" sayilirsa LiteLLM zincirin geri kalanini denemeden
  # tamamen basarisiz olabiliyor, bu yuzden dogrulanmamis/kirik modeller
  # zincirde TUTULMUYOR. Ayni zincir ki-cloud/-ceo/-chief arasinda
  # paylasilir - farklilasma birincil modelde (litellm_params.model).
  fallbacks:
    - ki-cloud: &fallback_chain
        - groq-llama-3.1-70b               # Groq, 70B, ucretsiz - dogrulandi OK
        - openrouter-google-gemma-4-31b-it  # OpenRouter, Gemma 31B, ucretsiz - dogrulandi OK
        - groq-llama-3.1-8b                 # Groq, 8B, ucretsiz, hizli son çare - dogrulandi OK
        - ollama-llama3.1                   # Ollama Cloud, abonelik-bazli, son guvence - dogrulandi OK
    # John'un birincili artik groq-llama-3.1-70b'yle ayni model oldugu icin
    # (bkz. yukarida ki-cloud-ceo tanimi) o girdi zincirden cikarildi, geri
    # kalani ayni.
    - ki-cloud-ceo:
        - openrouter-google-gemma-4-31b-it
        - groq-llama-3.1-8b
        - ollama-llama3.1
    - ki-cloud-chief: *fallback_chain
    - ki-cloud-manager: *fallback_chain
    - ki-cloud-worker: *fallback_chain

general_settings:
  master_key: ***REMOVED-LITELLM-MASTER-KEY***
  database_url: postgresql://ki:StrongPassword123!@ki-enterprise-postgres:5432/litellm
  otel: false
  max_request_size_mb: 150
  max_request_body_size_limit: 157286400
  allowed_routes:
    - /v1/chat/completions
    - /v1/completions
    - /v1/embeddings
    - /v1/models
    - /v1/images/generations
    - /model/info
    - /key/generate
    - /key/info
    - /user/info
  alerting: []
  proxy_budget_rescheduler_min_time: 0
  proxy_budget_rescheduler_max_time: 0
  disable_spend_logs: false
  disable_add_log_to_database: false
  disable_load_cache_before_adding_spend_logs: false
  disable_prometheus: false
  disable_adding_master_key_hash_to_db: true
  disable_adding_worker_key_hash_to_db: true
  disable_adding_master_key_sk_to_db: true
  disable_adding_worker_key_sk_to_db: true