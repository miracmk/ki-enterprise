  # Motto: "free as possible" - once ucretsiz+en guclu (Groq gpt-oss-120b),
  # sonra kesintisiz calisma icin sirali fallback zinciri. Tum core/*
  # servisleri (AI Gateway, Executive Board) LOKAL Ollama YERINE bu alias'i
  # kullanir - hicbiri host RAM'i tuketmez, hepsi bulut/cloud saglayicidir.
  # ============================================================
  - model_name: ki-cloud
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
      # Groq free-tier limitlerinin altinda tutulur - CEO/Executive Board/
      # Department Manager/Worker Pool hepsi bu alias'i paylastigi icin
      # merkezi bir limit, her serviste ayri rate-limit kodu yazmaktan
      # (ve unutmaktan) daha guvenilir. Asilirsa LiteLLM otomatik olarak
      # asagidaki fallback zincirine gecer (bkz. litellm_settings.fallbacks).
